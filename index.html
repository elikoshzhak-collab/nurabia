<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Нурабия 💜</title>
<style>
body{
margin:0;
font-family:'Arial', sans-serif;
text-align:center;
background: linear-gradient(135deg, #cda4ff, #e6ccff);
overflow-x:hidden;
}

#passwordScreen{
position:fixed;
width:100%;
height:100%;
background:#f2e6ff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#passwordScreen input{
padding:12px;
font-size:18px;
border-radius:10px;
border:2px solid #a64dff;
margin-bottom:20px;
}

#passwordScreen button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#a64dff;
color:white;
cursor:pointer;
}

.container{
display:none;
padding:20px;
}

h1{
font-size:46px;
color:#a64dff;
text-shadow: 0 0 10px #a64dff, 0 0 20px #d299ff;
animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
0%{text-shadow:0 0 5px #a64dff;}
100%{text-shadow:0 0 20px #d299ff,0 0 30px #a64dff;}
}

.photo img{
width:280px;
border-radius:25px;
box-shadow:0 12px 25px rgba(0,0,0,0.3);
margin-top:20px;
transition: transform 0.5s;
}
.photo img:hover{
transform: scale(1.07);
}

button{
margin-top:25px;
padding:15px 32px;
font-size:18px;
border:none;
border-radius:15px;
background:#a64dff;
color:white;
cursor:pointer;
}

#surprise{
display:none;
font-size:28px;
margin-top:20px;
color:#a64dff;
font-weight:bold;
}

#letter{
display:none;
margin-top:20px;
font-size:22px;
max-width:650px;
margin-left:auto;
margin-right:auto;
line-height:1.5;
color:#333;
}

#love{
margin-top:30px;
font-size:44px;
color:#a64dff;
font-weight:bold;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.25);}
100%{transform:scale(1);}
}

.heart, .star{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear infinite;
pointer-events:none;
}

.star{
color:#fff0ff;
font-size:24px;
}

@keyframes fall{
0%{transform:translateY(-10px);}
100%{transform:translateY(100vh);}
}
</style>
</head>
<body>

<div id="passwordScreen">
<h2>Введите пароль</h2>
<input type="password" id="passwordInput" placeholder="Пароль">
<button onclick="checkPassword()">Войти</button>
<p id="errorMsg" style="color:red;display:none;">Неверный пароль!</p>
</div>

<div class="container" id="content">

<h1>С 8 Марта, Нурабия 💜</h1>

<p>
Ты — сияющая звезда ✨  
Пусть каждый день будет наполнен счастьем, радостью и улыбками 💖
</p>

<div class="photo">
<img src="nurabiy.jpg">
</div>

<button onclick="showSurprise()">Нажми сюрприз 🎁</button>

<div id="surprise">
Ты невероятная и уникальная ❤️
</div>

<button onclick="showLetter()">Открыть письмо 💌</button>

<div id="letter">
Дорогая Нурабия,  
Желаю тебе бесконечного счастья, радости и любви.  
Пусть каждый день будет особенным ✨
</div>

<div id="love">
I ❤️ Nurabiy
</div>

<audio autoplay loop>
<source src="nurabiy-love.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function checkPassword(){
  const password="queen nurabiy";
  const input=document.getElementById("passwordInput").value;
  if(input===password){
    document.getElementById("passwordScreen").style.display="none";
    document.getElementById("content").style.display="block";
  } else {
    document.getElementById("errorMsg").style.display="block";
  }
}

function showSurprise(){
  document.getElementById("surprise").style.display="block";
}

function showLetter(){
  document.getElementById("letter").style.display="block";
}

function createHeartStar(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*4)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},8000);

  const star=document.createElement("div");
  star.classList.add("star");
  star.innerHTML="✨";
  star.style.left=Math.random()*100+"vw";
  star.style.animationDuration=(4+Math.random()*5)+"s";
  document.body.appendChild(star);
  setTimeout(()=>{star.remove();},9000);
}

setInterval(createHeartStar,250);

</script>
</body>
</html>
